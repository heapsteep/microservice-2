spring.application.name=microservice-2
server.port=8100

# Eureka changes:
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}

# microservice1.base-url=http://localhost:8000
microservice-1.service-id=microservice-1

# Http Interface changes:
spring.http.serviceclient.microservice-1.base-url=lb://${microservice-1.service-id}


# Tracing config:
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.correlation=[${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.include-application-name=false
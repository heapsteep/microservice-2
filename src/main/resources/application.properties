spring.application.name=microservice-2
server.port=8100

# Eureka changes:
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
#eureka.instance.instance-id=${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}

# microservice1.base-url=http://localhost:8000
microservice-1.service-id=microservice-1

# Http Interface changes:
spring.http.serviceclient.microservice-1.base-url=lb://${microservice-1.service-id}


# Tracing config:
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.correlation=[${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.include-application-name=false

spring.config.import=optional:configserver:http://localhost:8888
greeting.message-suffix=response from microservice-2 (local fallback)
app.config-demo.environment=local
management.endpoints.web.exposure.include=refresh,health,env,circuitbreakers

# Resilience4j circuit breaker (annotation-driven @CircuitBreaker, Feign path)
resilience4j.circuitbreaker.instances.CircuitBreaker1.sliding-window-size=5
resilience4j.circuitbreaker.instances.CircuitBreaker1.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.CircuitBreaker1.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.CircuitBreaker1.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.CircuitBreaker1.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.CircuitBreaker1.register-health-indicator=true
